<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Replicate AI Generator</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
    text-align: center;
    padding: 20px;
}

h1, h2 {
    color: #8a2be2;
}

textarea, select {
    width: 90%;
    max-width: 600px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    font-size: 16px;
    margin-top: 10px;
}

textarea {
    height: 120px;
}

button, a.download-btn {
    margin-top: 15px;
    padding: 12px 25px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    background: #8a2be2;
    color: white;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
}

img {
    max-width: 100%;
    margin-top: 20px;
    border-radius: 12px;
}

label {
    display: block;
    margin-top: 20px;
    font-size: 18px;
#history {
    margin: 20px 0;
}

.history-item {
    background: #222;
    color: white;
    padding: 10px;
    margin: 5px auto;
    max-width: 600px;
    border-radius: 8px;
    cursor: pointer;
    text-align: left;
}

.history-item:hover {
    opacity: 0.8;
}
.gallery {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
    margin-top: 20px;
}

.gallery img {
    width: 140px;
    border-radius: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>My Replicate AI Generator</h1>
<button onclick="document.getElementById('videoTab').scrollIntoView()">🎬 Image to Video</button>
<button onclick="document.getElementById('imageTab').scrollIntoView()">🖼 Image Generator</button>
<div id="imageTab">
<label>Main Prompt</label>
<textarea id="prompt">A cute orange cat sitting on a wooden fence, photorealistic</textarea>

<label>Negative Prompt</label>
<textarea id="negative">blurry, bad anatomy, extra limbs, distorted face, low quality, ugly, watermark, text</textarea>

<label>Aspect Ratio</label>
<select id="aspect_ratio">
    <option value="1:1">Square 1:1</option>
    <option value="16:9">Landscape 16:9</option>
    <option value="9:16">Portrait 9:16</option>
    <option value="4:3">Classic 4:3</option>
    <option value="3:4">Vertical 3:4</option>
</select>

<label>Style Preset</label>
<select id="style">
    <option value="">None</option>

    <option value="photorealistic, ultra detailed, professional photography, realistic lighting, sharp focus">
        📸 Photorealistic
    </option>

    <option value="cinematic lighting, movie still, dramatic atmosphere, epic composition, volumetric lighting">
        🎬 Cinematic
    </option>

    <option value="fantasy art, magical environment, epic fantasy, masterpiece, enchanted atmosphere">
        🏰 Fantasy
    </option>

    <option value="anime style, manga artwork, vibrant anime colors, highly detailed anime illustration">
        🌸 Anime
    </option>

    <option value="cyberpunk city, neon lights, futuristic, sci-fi atmosphere, glowing technology">
        🤖 Cyberpunk
    </option>
</select>
<input
    id="imageInput"
    placeholder="Image URL for image-to-image (optional)"
    <input
    type="file"
    id="imageFile"
    accept="image/*"
>
<br>
<button onclick="improvePrompt()">🤖 Improve Prompt</button>

<button onclick="generate()">Generate</button>

<p id="status"></p>

<img id="result" />

<br>

<a id="downloadBtn" class="download-btn" style="display:none;" target="_blank">
    Open Image
</a>
</div>

<div id="videoTab" style="display:none;">
    <h2>🎬 Image to Video</h2>
<label>Video Provider</label>
<select id="videoProvider">
    <option value="fal">Fal.ai</option>
    <option value="replicate">Replicate</option>
</select>
    <label>Image URL</label>
    <textarea id="videoImageUrl" placeholder="Paste image URL here"></textarea>

    <label>Video Prompt</label>
    <textarea id="videoPrompt" placeholder="Example: slow cinematic camera push-in, neon lights, realistic motion"></textarea>

    <button onclick="generateVideo()">Generate Video</button>

    <p id="videoStatus"></p>

    <video id="videoResult" controls style="display:none; max-width:100%; border-radius:12px; margin-top:20px;"></video>
<br>
<a id="videoDownloadBtn" class="download-btn" style="display:none;" target="_blank">
    Download Video
</a>

<h2>Video Gallery</h2>

<button onclick="clearVideoGallery()">
    Clear Video Gallery
</button>

<div id="videoGallery" class="gallery"></div>
</div>
    <h2>Prompt History</h2>

<button onclick="clearHistory()">
    Clear History
</button>

<div id="history"></div>
<h2>Gallery</h2>

<button onclick="clearGallery()">
    Clear Gallery
</button>

<div id="gallery" class="gallery"></div>

<script>
let galleryImages =
    JSON.parse(localStorage.getItem("galleryImages")) || [];
let galleryVideos =
    JSON.parse(localStorage.getItem("galleryVideos")) || [];
let promptHistory =
    JSON.parse(localStorage.getItem("promptHistory")) || [];

async function generate() {
    const prompt = document.getElementById("prompt").value;
    const imageInput = document.getElementById("imageInput").value;
    const negative = document.getElementById("negative").value;
    const aspect_ratio = document.getElementById("aspect_ratio").value;
    const style = document.getElementById("style").value;
    const status = document.getElementById("status");
    const result = document.getElementById("result");
    const downloadBtn = document.getElementById("downloadBtn");
    
    status.innerText = "Generating...";
    result.src = "";
    downloadBtn.style.display = "none";

    try {
        const response = await fetch("/api/generate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                prompt: prompt + ", " + style,
                negative: negative,
                aspect_ratio: aspect_ratio,
                image:imageInput
            })
        });

        const data = await response.json();
        addToHistory(prompt);
        if (data.image) {
            result.src = data.image;
            downloadBtn.href = data.image;
            downloadBtn.style.display = "inline-block";
            status.innerText = "Done!";
            addToGallery(data.image,prompt);
        } else {
            status.innerText = "Error: " + (data.error || "No image returned");
        }
    } catch (error) {
        status.innerText = "Error: " + error.message;
    }
}

function addToGallery(imageUrl, promptText) {
    galleryImages.unshift({
        image: imageUrl,
        prompt: promptText
    });

    if (galleryImages.length > 8) {
        galleryImages.pop();
    }

    localStorage.setItem("galleryImages", JSON.stringify(galleryImages));
    loadGallery();
}

function loadGallery() {
    gallery.innerHTML = "";

    galleryImages.forEach(item => {
        const div = document.createElement("div");
        div.className = "gallery-item";

        const img = document.createElement("img");
        img.src = item.image;
        img.onclick = () => window.open(item.image, "_blank");

        const text = document.createElement("div");
        text.className = "gallery-prompt";
        text.textContent = item.prompt || "";

        div.appendChild(img);
        div.appendChild(text);
        gallery.appendChild(div);
    
        
    });
}
function clearGallery() {
    galleryImages = [];

    localStorage.removeItem("galleryImages");

   loadGallery();
}


function addToHistory(prompt) {

    if (!prompt.trim()) return;

    promptHistory = promptHistory.filter(
        p => p !== prompt
    );

    promptHistory.unshift(prompt);

    if (promptHistory.length > 10) {
        promptHistory.pop();
    }

    localStorage.setItem(
        "promptHistory",
        JSON.stringify(promptHistory)
    );

    loadHistory();
}

function loadHistory() {

    const history =
        document.getElementById("history");

    history.innerHTML = "";

    promptHistory.forEach(prompt => {

        const div =
            document.createElement("div");

        div.className = "history-item";

        div.textContent = prompt;

        div.onclick = () => {
            document.getElementById("prompt").value =
                prompt;
        };

        history.appendChild(div);
    });
}

function clearHistory() {

    promptHistory = [];

    localStorage.removeItem(
        "promptHistory"
    );

    loadHistory();
}
function improvePrompt() {
    const promptBox = document.getElementById("prompt");
    const style = document.getElementById("style").value;

    let prompt = promptBox.value.trim();

    if (!prompt) {
        alert("Enter a prompt first");
        return;
    }

    let prefix = "masterpiece, best quality, ultra detailed";
    let suffix = "sharp focus, realistic lighting, high resolution, professional composition";

    if (style.includes("photorealistic")) {
        prefix = "photorealistic, ultra detailed, professional photography, natural skin tones";
        suffix = "realistic shadows, detailed textures, sharp focus, 4k, DSLR quality";
    }

    if (style.includes("cinematic")) {
        prefix = "cinematic movie still, dramatic atmosphere, professional film lighting";
        suffix = "depth of field, volumetric lighting, dramatic shadows, epic composition, 4k";
    }

    if (style.includes("fantasy")) {
        prefix = "fantasy art, magical atmosphere, enchanted environment, epic fantasy scene";
        suffix = "glowing particles, mystical lighting, detailed background, masterpiece quality";
    }

    if (style.includes("anime")) {
        prefix = "anime style, vibrant anime colors, highly detailed anime illustration";
        suffix = "clean line art, expressive character design, beautiful background, sharp details";
    }

    if (style.includes("cyberpunk")) {
        prefix = "cyberpunk city, neon lights, futuristic sci-fi atmosphere";
        suffix = "glowing technology, rain reflections, holograms, cinematic lighting, ultra detailed";
    }

    promptBox.value = prefix + ", " + prompt + ", " + suffix;
}
function showTab(tabName) {
    document.querySelectorAll("#imageTab, #videoTab").forEach(tab => {
        tab.style.display = "none";
    });

    const selectedTab = document.getElementById(tabName);

    if (!selectedTab) {
        alert("Tab not found: " + tabName);
        return;
    }

    selectedTab.style.display = "block";

    window.scrollTo(0, 0);
}

    imageTab.style.display = "none";
    videoTab.style.display = "none";

    document.getElementById(tabName).style.display = "block";
}

async function generateVideo() {
    const imageUrl = document.getElementById("videoImageUrl").value;
    const prompt = document.getElementById("videoPrompt").value;
    const provider = document.getElementById("videoProvider").value;
    const status = document.getElementById("videoStatus");
    const video = document.getElementById("videoResult");
    const videoDownloadBtn = document.getElementById("videoDownloadBtn");
    if (!imageUrl.trim()) {
        alert("Paste an image URL first");
        return;
    }

    status.innerText = "Generating video...";
    video.style.display = "none";
    videoDownloadBtn.style.display = "none";
    videoDownloadBtn.href = "";
    video.src = "";

    try {
        const response = await fetch("/api/video", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
            provider: provider,
            image: imageUrl,
            prompt: prompt
})
        });

        const data = await response.json();

        if (data.video) {
    video.src = data.video;
    video.style.display = "block";

    videoDownloadBtn.href = data.video;
    videoDownloadBtn.style.display = "inline-block";

    status.innerText = "Video ready!";
    addToVideoGallery(data.video, imageUrl, prompt);
        }
        } else {
            status.innerText = "Error: " + (data.error || "No video returned");
        }
    } catch (error) {
        status.innerText = "Error: " + error.message;
    }
}
    function addToVideoGallery(videoUrl, imageUrl, promptText) {
    galleryVideos.unshift({
        video: videoUrl,
        image: imageUrl,
        prompt: promptText
    });

    if (galleryVideos.length > 8) {
        galleryVideos.pop();
    }

    localStorage.setItem("galleryVideos", JSON.stringify(galleryVideos));
    loadVideoGallery();
}

function loadVideoGallery() {
    const videoGallery = document.getElementById("videoGallery");

    if (!videoGallery) return;

    videoGallery.innerHTML = "";

    galleryVideos.forEach(item => {
        const div = document.createElement("div");
        div.className = "gallery-item";

        const vid = document.createElement("video");
        vid.src = item.video;
        vid.controls = true;
        vid.style.maxWidth = "100%";
        vid.style.borderRadius = "12px";
        vid.style.marginTop = "20px";

        const text = document.createElement("div");
        text.className = "gallery-prompt";
        text.textContent = item.prompt || "";

        const link = document.createElement("a");
        link.href = item.video;
        link.target = "_blank";
        link.className = "download-btn";
        link.textContent = "Download Video";

        div.appendChild(vid);
        div.appendChild(text);
        div.appendChild(link);

        videoGallery.appendChild(div);
    });
}

function clearVideoGallery() {
    galleryVideos = [];
    localStorage.removeItem("galleryVideos");
    loadVideoGallery();
}
    loadGallery();
    loadHistory();
    loadVideoGallery();
</script>

    

</body>
</html>
