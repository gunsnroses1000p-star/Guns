<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Replicate AI Generator</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
    text-align: center;
    padding: 20px;
}

h1 {
    color: #8a2be2;
}

textarea {
    width: 90%;
    max-width: 600px;
    height: 120px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    font-size: 16px;
    margin-top: 10px;
}

button, a.download-btn {
    margin-top: 15px;
    padding: 12px 25px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    background: #8a2be2;
    color: white;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
}

button:hover, a.download-btn:hover {
    opacity: 0.9;
}

img {
    max-width: 100%;
    margin-top: 20px;
    border-radius: 12px;
}

label {
    display: block;
    margin-top: 20px;
    font-size: 18px;
}
</style>
</head>

<body>

<h1>My Replicate AI Generator</h1>

<label>Main Prompt</label>
<textarea id="prompt" placeholder="Type your prompt here...">A cute orange cat sitting on a wooden fence, photorealistic</textarea>

<label>Negative Prompt</label>
<textarea id="negative" placeholder="Things to avoid...">blurry, bad anatomy, extra limbs, distorted face, low quality, ugly, watermark, text</textarea>

<br>

<button onclick="generate()">Generate</button>

<p id="status"></p>

<img id="result" />

<br>

<a id="downloadBtn" class="download-btn" style="display:none;" download="ai-image.webp">
    Download Image
</a>

<script>
async function generate() {
    const prompt = document.getElementById("prompt").value;
    const negative = document.getElementById("negative").value;
    const status = document.getElementById("status");
    const result = document.getElementById("result");
    const downloadBtn = document.getElementById("downloadBtn");

    status.innerText = "Generating...";
    result.src = "";
    downloadBtn.style.display = "none";

    try {
        const response = await fetch("/api/generate", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                prompt: prompt,
                negative: negative
            })
        });

        const data = await response.json();

        if (data.image) {
            result.src = data.image;
            downloadBtn.href = data.image;
            downloadBtn.style.display = "inline-block";
            status.innerText = "Done!";
        } else {
            status.innerText = "Error: " + (data.error || "No image returned");
        }

    } catch (error) {
        status.innerText = "Error: " + error.message;
    }
}
</script>

</body>
</html>
