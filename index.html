<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Replicate AI Generator</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
    text-align: center;
    padding: 20px;
}

h1, h2 {
    color: #8a2be2;
}

textarea, select {
    width: 90%;
    max-width: 600px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    font-size: 16px;
    margin-top: 10px;
}

textarea {
    height: 120px;
}

button, a.download-btn {
    margin-top: 15px;
    padding: 12px 25px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    background: #8a2be2;
    color: white;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
}

img {
    max-width: 100%;
    margin-top: 20px;
    border-radius: 12px;
}

label {
    display: block;
    margin-top: 20px;
    font-size: 18px;
#history {
    margin: 20px 0;
}

.history-item {
    background: #222;
    color: white;
    padding: 10px;
    margin: 5px auto;
    max-width: 600px;
    border-radius: 8px;
    cursor: pointer;
    text-align: left;
}

.history-item:hover {
    opacity: 0.8;
}
.gallery {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
    margin-top: 20px;
}

.gallery img {
    width: 140px;
    border-radius: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>My Replicate AI Generator</h1>

<label>Main Prompt</label>
<textarea id="prompt">A cute orange cat sitting on a wooden fence, photorealistic</textarea>

<label>Negative Prompt</label>
<textarea id="negative">blurry, bad anatomy, extra limbs, distorted face, low quality, ugly, watermark, text</textarea>

<label>Aspect Ratio</label>
<select id="aspect_ratio">
    <option value="1:1">Square 1:1</option>
    <option value="16:9">Landscape 16:9</option>
    <option value="9:16">Portrait 9:16</option>
    <option value="4:3">Classic 4:3</option>
    <option value="3:4">Vertical 3:4</option>
</select>

<label>Style Preset</label>
<select id="style">
    <option value="">None</option>

    <option value="photorealistic, ultra detailed, professional photography, realistic lighting, sharp focus">
        📸 Photorealistic
    </option>

    <option value="cinematic lighting, movie still, dramatic atmosphere, epic composition, volumetric lighting">
        🎬 Cinematic
    </option>

    <option value="fantasy art, magical environment, epic fantasy, masterpiece, enchanted atmosphere">
        🏰 Fantasy
    </option>

    <option value="anime style, manga artwork, vibrant anime colors, highly detailed anime illustration">
        🌸 Anime
    </option>

    <option value="cyberpunk city, neon lights, futuristic, sci-fi atmosphere, glowing technology">
        🤖 Cyberpunk
    </option>
</select>
<input
    id="imageInput"
    placeholder="Image URL for image-to-image (optional)"
>
<br>
<button onclick="generate()">Generate</button>

<p id="status"></p>

<img id="result" />

<br>

<a id="downloadBtn" class="download-btn" style="display:none;" target="_blank">
    Open Image
</a>
<h2>Prompt History</h2>

<button onclick="clearHistory()">
    Clear History
</button>

<div id="history"></div>
<h2>Gallery</h2>

<button onclick="clearGallery()">
    Clear Gallery
</button>

<div id="gallery" class="gallery"></div>

<script>
let galleryImages =
    JSON.parse(localStorage.getItem("galleryImages")) || [];

let promptHistory =
    JSON.parse(localStorage.getItem("promptHistory")) || [];

async function generate() {
    const prompt = document.getElementById("prompt").value;
    const imageInput = document.getElementById("imageInput").value;
    const negative = document.getElementById("negative").value;
    const aspect_ratio = document.getElementById("aspect_ratio").value;
    const style = document.getElementById("style").value;
    const status = document.getElementById("status");
    const result = document.getElementById("result");
    const downloadBtn = document.getElementById("downloadBtn");
    
    status.innerText = "Generating...";
    result.src = "";
    downloadBtn.style.display = "none";

    try {
        const response = await fetch("/api/generate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                prompt: prompt + ", " + style,
                negative: negative,
                aspect_ratio: aspect_ratio,
                image:imageInput
            })
        });

        const data = await response.json();
        addToHistory(prompt);
        if (data.image) {
            result.src = data.image;
            downloadBtn.href = data.image;
            downloadBtn.style.display = "inline-block";
            status.innerText = "Done!";
            addToGallery(data.image,prompt);
        } else {
            status.innerText = "Error: " + (data.error || "No image returned");
        }
    } catch (error) {
        status.innerText = "Error: " + error.message;
    }
}

function addToGallery(imageUrl, promptText) {
    galleryImages.unshift({
        image: imageUrl,
        prompt: promptText
    });

    if (galleryImages.length > 8) {
        galleryImages.pop();
    }

    localStorage.setItem("galleryImages", JSON.stringify(galleryImages));
    loadGallery();
}

function loadGallery() {
    gallery.innerHTML = "";

    galleryImages.forEach(item => {
        const div = document.createElement("div");
        div.className = "gallery-item";

        const img = document.createElement("img");
        img.src = item.image;
        img.onclick = () => window.open(item.image, "_blank");

        const text = document.createElement("div");
        text.className = "gallery-prompt";
        text.textContent = item.prompt || "";

        div.appendChild(img);
        div.appendChild(text);
        gallery.appendChild(div);
    
        
    });
}
function clearGallery() {
    galleryImages = [];

    localStorage.removeItem("galleryImages");

   loadGallery();
}


function addToHistory(prompt) {

    if (!prompt.trim()) return;

    promptHistory = promptHistory.filter(
        p => p !== prompt
    );

    promptHistory.unshift(prompt);

    if (promptHistory.length > 10) {
        promptHistory.pop();
    }

    localStorage.setItem(
        "promptHistory",
        JSON.stringify(promptHistory)
    );

    loadHistory();
}

function loadHistory() {

    const history =
        document.getElementById("history");

    history.innerHTML = "";

    promptHistory.forEach(prompt => {

        const div =
            document.createElement("div");

        div.className = "history-item";

        div.textContent = prompt;

        div.onclick = () => {
            document.getElementById("prompt").value =
                prompt;
        };

        history.appendChild(div);
    });
}

function clearHistory() {

    promptHistory = [];

    localStorage.removeItem(
        "promptHistory"
    );

    loadHistory();
}
loadGallery();
loadHistory();
</script>

    

</body>
</html>
