<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Replicate AI Generator</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
    text-align: center;
    padding: 20px;
}

h1 {
    color: #8a2be2;
}

textarea {
    width: 90%;
    max-width: 600px;
    height: 120px;
    padding: 10px;
    border-radius: 8px;
    border: none;
}

button {
    margin-top: 15px;
    padding: 12px 25px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    background: #8a2be2;
    color: white;
    cursor: pointer;
}

button:hover {
    opacity: 0.9;
}

img {
    max-width: 100%;
    margin-top: 20px;
    border-radius: 12px;
}
</style>
</head>

<body>

<h1>My Replicate AI Generator</h1>

<textarea id="prompt" placeholder="Type your prompt here..."></textarea>
<br>

<button onclick="generate()">Generate</button>

<p id="status"></p>

<img id="result" />

<script>
async function generate() {
    const prompt = document.getElementById("prompt").value;
    const status = document.getElementById("status");
    const result = document.getElementById("result");

    status.innerText = "Generating...";
    result.src = "";

    try {
        const response = await fetch("/api/generate", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                prompt: prompt
            })
        });

        const data = await response.json();

        if (data.image) {
            result.src = data.image;
            status.innerText = "Done!";
        } else {
            status.innerText =
                "Error: " + (data.error || "No image returned");
        }

    } catch (error) {
        status.innerText = "Error: " + error.message;
    }
}
</script>

</body>
</html>
